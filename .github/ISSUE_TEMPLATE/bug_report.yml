name: Bug report
description: Report a problem with LingoBar
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        If a Google Translate feature stopped working — the **copy** shortcut, **speak/mic**
        hotkeys, or the **hiding of non-translator elements** — it may be caused by a change
        to the Google Translate page itself. Please mention if that seems to be the case; a
        small selector fix (PR welcome!) usually solves it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open LingoBar with …
        2. Click / press …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 14.5"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LingoBar version
      description: See the About window.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Mac chip
      options:
        - Apple Silicon (M1/M2/M3+)
        - Intel
    validations:
      required: false
