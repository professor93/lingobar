<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoBar Logs</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: #1b1b1d;
        color: #d6d6d6;
        font: 11.5px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex;
        flex-direction: column;
      }
      header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        background: #2a2a2c;
        border-bottom: 1px solid #3a3a3c;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 12px;
      }
      header .grow {
        flex: 1;
        opacity: 0.55;
      }
      button {
        font: inherit;
        padding: 3px 9px;
        border-radius: 5px;
        border: 1px solid #4a4a4c;
        background: #3a3a3c;
        color: #f2f2f2;
        cursor: pointer;
      }
      #log {
        flex: 1 1 auto;
        margin: 0;
        padding: 8px 10px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>LingoBar Logs</strong>
      <span class="grow">live — newest at the bottom</span>
      <button id="clear">Clear</button>
    </header>
    <pre id="log"></pre>
    <script type="module" src="/src/logview.ts"></script>
  </body>
</html>
