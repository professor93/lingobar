<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoBar History</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font: 13px -apple-system, system-ui, sans-serif;
        background: #f4f4f5;
        color: #1c1c1e;
        display: flex;
        flex-direction: column;
      }
      header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #e9e9eb;
        border-bottom: 1px solid #d4d4d6;
      }
      header .grow {
        flex: 1;
      }
      button {
        font: inherit;
        padding: 3px 10px;
        border-radius: 6px;
        border: 1px solid #c4c4c6;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #f0f0f2;
      }
      button.danger {
        color: #c0392b;
      }
      #list {
        flex: 1 1 auto;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        opacity: 0.6;
        padding: 7px 10px;
        background: #ededef;
        border-bottom: 1px solid #d8d8da;
      }
      tbody tr.row {
        cursor: pointer;
        border-bottom: 1px solid #e6e6e8;
      }
      tbody tr.row:hover {
        background: #f0f0f2;
      }
      tbody tr.row.open {
        background: #e7eef9;
      }
      td {
        padding: 7px 10px;
        font-size: 12px;
        vertical-align: top;
      }
      td.src {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      td.lang {
        white-space: nowrap;
        font-weight: 600;
        opacity: 0.85;
      }
      td.when {
        white-space: nowrap;
        font-size: 11px;
        opacity: 0.65;
      }
      tr.detail > td {
        padding: 0 10px 12px;
        background: #fafafb;
      }
      .field {
        margin-top: 8px;
      }
      .label {
        font-size: 11px;
        opacity: 0.5;
        margin-bottom: 2px;
      }
      .text {
        white-space: pre-wrap;
        word-break: break-word;
        background: #fff;
        border: 1px solid #e4e4e6;
        border-radius: 6px;
        padding: 6px 8px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .empty {
        opacity: 0.5;
        text-align: center;
        padding: 40px 12px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1c1c1e;
          color: #e6e6e6;
        }
        header {
          background: #2a2a2c;
          border-bottom-color: #3a3a3c;
        }
        button {
          background: #3a3a3c;
          border-color: #4a4a4c;
          color: #f2f2f2;
        }
        button:hover {
          background: #454547;
        }
        button.danger {
          color: #ff6b5e;
        }
        thead th {
          background: #262628;
          border-bottom-color: #3a3a3c;
        }
        tbody tr.row {
          border-bottom-color: #313133;
        }
        tbody tr.row:hover {
          background: #2c2c2e;
        }
        tbody tr.row.open {
          background: #2f3a4a;
        }
        tr.detail > td {
          background: #242426;
        }
        .text {
          background: #1c1c1e;
          border-color: #3a3a3c;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>History</strong>
      <span class="grow"></span>
      <button id="clear" class="danger">Clear all</button>
    </header>
    <div id="list">
      <table id="tbl" hidden>
        <colgroup>
          <col style="width: 44%" />
          <col style="width: 15%" />
          <col style="width: 15%" />
          <col style="width: 26%" />
        </colgroup>
        <thead>
          <tr>
            <th>Source</th>
            <th>From</th>
            <th>To</th>
            <th>When</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty" hidden>No history yet.</div>
    </div>
    <script type="module" src="/src/history.ts"></script>
  </body>
</html>
